<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Web Applications Project - Password Update</title>
    <link href="/Dialogue-Platform/css/pagestyle.css" rel="stylesheet">
</head>
<body>
    <h1>Project of Anastasis Drougas</h1>
   	
    <div class="area">
        <h2>Password Update Area</h2>
        
        <form id="passwordForm" action="/Dialogue-Platform/PasswordUpdateServlet" method="POST">
            <label for="username">Username:</label>
            <input type="text" name="username" id="username">
            <br>
            
            <label for="oldPassword">Existing Password:</label>
            <input type="password" name="oldPassword" id="oldPassword" autocomplete="off">
            <br>
            
            <label for="newPassword">New Password:</label>
            <input type="password" name="newPassword" id="newPassword" autocomplete="off">
            <br>
            
            <label for="confirmPassword1">Confirm New Password:</label>
            <input type="password" name="confirmPassword1" id="confirmPassword1" autocomplete="off">
            <br>
            
            <label for="confirmPassword2">Re-confirm New Password:</label>
            <input type="password" name="confirmPassword2" id="confirmPassword2" autocomplete="off">
            <br>
            
            <input type="reset" value="Reset">
            <input type="submit" id="register-button" value="Update Password">
        </form>
        
        <div id="output-div-1" class="output-area" style="color: red; margin-top: 10px; font-weight: bold;"></div>
    </div>
    
    <script src="/Dialogue-Platform/js/validate.js"></script>
</body>
</html>
